services:
  - type: web
    name: ISTKHAR-music-bot
    runtime: python
    plan: free
    buildCommand: "pip install -U pip && pip install -r requirements.txt"
    startCommand: "python3 -m ISTKHAR_MUSIC"
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: STRING_SESSION
        sync: false
      - key: MONGO_DB_URI
        sync: false
      - key: OWNER_ID
        sync: false
      - key: LOGGER_ID
        sync: false

# ◈ സ്റ്റാർട്ട് സന്ദേശങ്ങൾ
start_1: "◉ {0} ജീവനോടെയുണ്ട് ബേബി.\n\n⧗ അപ്‌ടൈം : {1}"
start_2: "⊹♫ ഹേയ്, {0} ❥\nഞാൻ {1} ✧\n\n╭─━━━━━━━━━━⧫\n│ ✦ പ്രേമത്തോടെ സംഗീതം ആസ്വദിക്കൂ ✦\n│ ♫ ഓൾ-ഇൻ-വൺ മ്യൂസിക് ബോട്ട്\n╰─━━━━━━━━━━⧫\n╭─━━━━━━━━━━⧫\n│ ♪ വോയ്‌സ് ചാറ്റിൽ മെലഡികൾ പ്ലേ ചെയ്യുക\n│ ❐ മനോഹരമായ ചിത്രങ്ങൾ സൃഷ്ടിക്കുക\n│ ⊹ നിരവധി ഭാഷകളിൽ ടെക്സ്റ്റ് വിവർത്തനം ചെയ്യുക\n│ ⚡ ചാറ്റുകൾ നിയന്ത്രിക്കുക — മ്യൂട്ട് | ബാൻ | അൺബാൻ | കിക്ക്\n│ ✧ പ്രത്യേക സ്വാഗത സന്ദേശങ്ങൾ\n│ ⋆ കൂടുതൽ ഫീച്ചറുകൾ → കമാൻഡ്സ് ബട്ടൺ ക്ലിക്ക് ചെയ്യുക\n╰─━━━━━━━━━━⧫\n◈ എല്ലാ മൊഡ്യൂളുകളും കമാൻഡുകളും കണ്ടെത്താൻ ഹെൽപ്പ് ക്ലിക്ക് ചെയ്യുക ❥\n\n⌯ ഡെവലപ്പർ : [⎎ 𝙸𝚂𝚃𝙺𝙷𝙰𝚁 ⎎](https://t.me/IAMIstkhar)"
start_3: "⊹ ഹേയ് {0},\nഇത് {1}\n\n❥ എന്നെ {2} ൽ ചേർത്തതിന് നന്ദി, {3} ഇനി ഈ ചാറ്റിൽ പാട്ടുകൾ പ്ലേ ചെയ്യാം."
start_4: "⊞ <b>സൂപ്പർഗ്രൂപ്പ് ആവശ്യമാണ്</b> ⊞\n\n⟳ ദയവായി നിങ്ങളുടെ ഗ്രൂപ്പിനെ സൂപ്പർഗ്രൂപ്പാക്കി എന്നെ വീണ്ടും ചേർക്കുക.\n\n◈ സൂപ്പർഗ്രൂപ്പ് എങ്ങനെ ഉണ്ടാക്കാം?\n- നിങ്ങളുടെ ഗ്രൂപ്പ് ചാറ്റ് ഹിസ്റ്ററി ഒരിക്കൽ ദൃശ്യമാക്കുക."
start_5: "⊘ <b>↝ ബ്ലാക്ക്‌ലിസ്റ്റ് ചെയ്ത ചാറ്റ് ↜</b>\n\n⊗ ഈ ചാറ്റ് {0} ഡാറ്റാബേസിൽ ബ്ലാക്ക്‌ലിസ്റ്റ് ചെയ്യപ്പെട്ടിരിക്കുന്നു.\n↬ ദയവായി സുഡോ ഉപയോക്താവിനോട് നിങ്ങളുടെ ചാറ്റ് അൺബ്ലാക്ക്‌ലിസ്റ്റ് ചെയ്യാൻ അഭ്യർത്ഥിക്കുക അല്ലെങ്കിൽ സപ്പോർട്ട് ചാറ്റിലേക്ക് പോകുക."
start_6: "♪ <b>ട്രാക്ക് വിവരങ്ങൾ</b> ♪\n\n◈ ശീർഷകം : {0}\n\n⧗ ദൈർഘ്യം : {1} മിനിറ്റ്\n❐ കാഴ്ചകൾ : <code>{2}</code>\n◈ പ്രസിദ്ധീകരിച്ചത് : {3}\n◈ ചാനൽ : <a href={4}>{5}</a>\n\n⊛ <u><b>സെർച്ച് പവേർഡ് ബൈ {6}</b></u>"


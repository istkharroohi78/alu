# ⌬ அமைப்புகள் செய்திகள்
setting_1: "⌬ <u><b>{0} அமைப்புகள் பேனல்</b></u>\n\n❐ அரட்டை ஐடி : <code>{1}</code>\n❐ அரட்டை தலைப்பு : {2}\n\n◈ அமைப்புகளை மாற்ற கீழே உள்ள பொத்தான்களை கிளிக் செய்யவும்."
setting_2: "⊛ நேரடி : தேடல் வினவலை நேரடியாக இசைக்கிறது.\n\n◈ இன்லைன் : வீடியோ மற்றும் ஆடியோ இடையே தேர்வு செய்ய இன்லைன் பொத்தான்களை கொடுக்கிறது."
setting_3: "⊹ அனைவரும் : யாரும் நிர்வாகி கட்டளைகளை (தவிர், இடைநிறுத்து, மீண்டும் தொடங்கு போன்றவை) பயன்படுத்தலாம்.\n\n᚛ நிர்வாகி மட்டும் : நிர்வாகிகள் மற்றும் அங்கீகரிக்கப்பட்ட பயனர்கள் மட்டுமே கட்டளைகளைப் பயன்படுத்த முடியும்."
setting_4: "❍ அங்கீகரிக்கப்பட்ட பயனர்கள் கண்டுபிடிக்கப்படவில்லை."
setting_5: "↬ குழு : கட்டளை கொடுத்த குழுவில் இசையை இசைக்கிறது.\n\n◈ சேனல் : நீங்கள் விரும்பும் சேனலில் இசையை இசைக்கிறது. சேனல் ஐடி அமைக்கவும் /channelplay"
setting_6: "⊹ அனைவரும் : இந்த குழுவில் உள்ள யாரும் இசையை இசைக்கலாம்.\n\n᚛ நிர்வாகி மட்டும்: நிர்வாகிகள் மட்டுமே குழுவில் இசையை இசைக்க முடியும்."
setting_7: "◈ தயவுசெய்து /channelplay மூலம் சேனல் ஐடி வரையறுக்கவும்"
setting_8: "⊞ இந்த பயன்முறை இயக்கப்படும்போது, நிர்வாகி உரிமைகள் இல்லாத நபர்கள் குறிப்பிட்ட எண்ணிக்கையிலான வாக்குகளுக்குப் பிறகு நிர்வாகி கட்டளைகளைப் பயன்படுத்தலாம்."
setting_9: "▣ நிர்வாகி கட்டளைகளைப் பயன்படுத்த தேவையான தற்போதைய வாக்குகள் : {0}"
setting_10: "⊞ வாக்களிப்பு பயன்முறை முடக்கப்பட்டது."
setting_11: "▣ குறைந்தபட்ச வாக்குகள் 2 ஆக இருக்க வேண்டும். இதை விட குறைவாக வைக்க முடியாது."

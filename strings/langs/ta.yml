# ◈ தொடக்க செய்திகள்
start_1: "◉ {0} உயிருடன் இருக்கிறது பேபி.\n\n⧗ அப்டைம் : {1}"
start_2: "⊹♫ ஹேய், {0} ❥\nநான் {1} ✧\n\n╭─━━━━━━━━━━⧫\n│ ✦ அன்புடன் இசையை ஆராயுங்கள் ✦\n│ ♫ ஆல்-இன்-ஒன் மியூசிக் பாட்\n╰─━━━━━━━━━━⧫\n╭─━━━━━━━━━━⧫\n│ ♪ வாய்ஸ் சாட்டில் இசையை இசைக்கவும்\n│ ❐ அழகான படங்களை உருவாக்கவும்\n│ ⊹ பல மொழிகளில் உரையை மொழிபெயர்க்கவும்\n│ ⚡ அரட்டைகளை நிர்வகிக்கவும் — மியூட் | தடை | தடை நீக்கு | நீக்கு\n│ ✧ சிறப்பு வரவேற்பு செய்திகள்\n│ ⋆ மேலும் அம்சங்கள் → கட்டளைகள் பொத்தானை கிளிக் செய்யவும்\n╰─━━━━━━━━━━⧫\n◈ அனைத்து தொகுதிகள் மற்றும் கட்டளைகளை கண்டறிய உதவி கிளிக் செய்யவும் ❥\n\n⌯ டெவலப்பர் : [⎎ 𝙸𝚂𝚃𝙺𝙷𝙰𝚁 ⎎](https://t.me/IAMIstkhar)"
start_3: "⊹ ஹேய் {0},\nஇது {1}\n\n❥ என்னை {2} இல் சேர்த்ததற்கு நன்றி, {3} இப்போது இந்த அரட்டையில் பாடல்களை இசைக்க முடியும்."
start_4: "⊞ <b>சூப்பர்குரூப் தேவை</b> ⊞\n\n⟳ தயவுசெய்து உங்கள் குழுவை சூப்பர்குரூப்பாக மாற்றி என்னை மீண்டும் சேர்க்கவும்.\n\n◈ சூப்பர்குரூப் எப்படி உருவாக்குவது?\n- உங்கள் குழு அரட்டை வரலாற்றை ஒருமுறை தெரியுமாறு செய்யவும்."
start_5: "⊘ <b>↝ தடைப்பட்டியலில் சேர்க்கப்பட்ட அரட்டை ↜</b>\n\n⊗ இந்த அரட்டை {0} தரவுத்தளத்தில் தடைப்பட்டியலில் சேர்க்கப்பட்டுள்ளது.\n↬ தயவுசெய்து சூடோ பயனரிடம் உங்கள் அரட்டையை தடைப்பட்டியலிலிருந்து நீக்கும்படி கோருங்கள் அல்லது ஆதரவு அரட்டைக்கு செல்லுங்கள்."
start_6: "♪ <b>டிராக் தகவல்</b> ♪\n\n◈ தலைப்பு : {0}\n\n⧗ கால அளவு : {1} நிமிடங்கள்\n❐ பார்வைகள் : <code>{2}</code>\n◈ வெளியிடப்பட்டது : {3}\n◈ சேனல் : <a href={4}>{5}</a>\n\n⊛ <u><b>தேடல் இயக்கப்பட்டது {6}</b></u>"


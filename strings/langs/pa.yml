start_1: "◉ {0} ਜ਼ਿੰਦਾ ਹੈ ਬੇਬੀ।\n\n⧗ ਅੱਪਟਾਈਮ : {1}"
start_2: "⊹♫ ਹੈਲੋ, {0} ❥\nਮੈਂ {1} ਹਾਂ ✧\n\n╭─━━━━━━━━━━⧫\n│ ✦ ਪਿਆਰ ਨਾਲ ਸੰਗੀਤ ਦੀ ਖੋਜ ਕਰੋ ✦\n│ ♫ ਆਲ-ਇਨ-ਵਨ ਮਿਊਜ਼ਿਕ ਬੋਟ\n╰─━━━━━━━━━━⧫\n╭─━━━━━━━━━━⧫\n│ ♪ ਵੌਇਸ ਚੈਟ ਵਿੱਚ ਧੁਨਾਂ ਪਲੇ ਕਰੋ\n│ ❐ ਸੁੰਦਰ ਤਸਵੀਰਾਂ ਬਣਾਓ\n│ ⊹ ਕਈ ਭਾਸ਼ਾਵਾਂ ਵਿੱਚ ਟੈਕਸਟ ਅਨੁਵਾਦ ਕਰੋ\n│ ⚡ ਚੈਟਾਂ ਨੂੰ ਕੰਟਰੋਲ ਕਰੋ — ਮਿਊਟ | ਬੈਨ | ਅਨਬੈਨ | ਕਿੱਕ\n│ ✧ ਵਿਸ਼ੇਸ਼ ਸਵਾਗਤ ਸੁਨੇਹੇ\n│ ⋆ ਹੋਰ ਫ਼ੀਚਰ → ਕਮਾਂਡਾਂ ਬਟਨ ਕਲਿੱਕ ਕਰੋ\n╰─━━━━━━━━━━⧫\n◈ ਸਾਰੇ ਮੋਡਿਊਲ ਅਤੇ ਕਮਾਂਡਾਂ ਲੱਭਣ ਲਈ ਹੈਲਪ ਕਲਿੱਕ ਕਰੋ ❥\n\n⌯ ਡਿਵੈਲਪਰ : [⎎ 𝙸𝚂𝚃𝙺𝙷𝙰𝚁 ⎎](https://t.me/IAMIstkhar)"
start_3: "⊹ ਹੈਲੋ {0},\nਇਹ {1} ਹੈ\n\n❥ ਮੈਨੂੰ {2} ਵਿੱਚ ਸ਼ਾਮਲ ਕਰਨ ਲਈ ਧੰਨਵਾਦ, {3} ਹੁਣ ਇਸ ਚੈਟ ਵਿੱਚ ਗਾਣੇ ਪਲੇ ਕਰ ਸਕਦਾ ਹੈ।"
start_4: "⊞ <b>ਸੁਪਰਗਰੁੱਪ ਲੋੜੀਂਦਾ ਹੈ</b> ⊞\n\n⟳ ਕਿਰਪਾ ਕਰਕੇ ਆਪਣੇ ਗਰੁੱਪ ਨੂੰ ਸੁਪਰਗਰੁੱਪ ਬਣਾਓ ਅਤੇ ਮੈਨੂੰ ਦੁਬਾਰਾ ਸ਼ਾਮਲ ਕਰੋ।\n\n◈ ਸੁਪਰਗਰੁੱਪ ਕਿਵੇਂ ਬਣਾਉਣਾ ਹੈ?\n- ਆਪਣੇ ਗਰੁੱਪ ਦਾ ਚੈਟ ਇਤਿਹਾਸ ਇੱਕ ਵਾਰ ਦਿਖਾਈ ਦੇਣ ਯੋਗ ਬਣਾਓ।"
start_5: "⊘ <b>↝ ਬਲੈਕਲਿਸਟ ਕੀਤੀ ਚੈਟ ↜</b>\n\n⊗ ਇਹ ਚੈਟ {0} ਡੇਟਾਬੇਸ ਵਿੱਚ ਬਲੈਕਲਿਸਟ ਕੀਤੀ ਗਈ ਹੈ।\n↬ ਕਿਰਪਾ ਕਰਕੇ ਸੁਡੋ ਉਪਭੋਗਤਾ ਤੋਂ ਆਪਣੀ ਚੈਟ ਅਨਬਲੈਕਲਿਸਟ ਕਰਨ ਦੀ ਬੇਨਤੀ ਕਰੋ ਜਾਂ ਸਪੋਰਟ ਚੈਟ 'ਤੇ ਜਾਓ।"

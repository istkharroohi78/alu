# ◈ ಸ್ಟಾರ್ಟ್ ಸಂದೇಶಗಳು
start_1: "◉ {0} ಜೀವಂತವಾಗಿದೆ ಬೇಬಿ.\n\n⧗ ಅಪ್‌ಟೈಮ್ : {1}"
start_2: "⊹♫ ಹೇಯ್, {0} ❥\nನಾನು {1} ✧\n\n╭─━━━━━━━━━━⧫\n│ ✦ ಪ್ರೀತಿಯಿಂದ ಸಂಗೀತವನ್ನು ಅನ್ವೇಷಿಸಿ ✦\n│ ♫ ಆಲ್-ಇನ್-ವನ್ ಮ್ಯೂಜಿಕ್ ಬಾಟ್\n╰─━━━━━━━━━━⧫\n╭─━━━━━━━━━━⧫\n│ ♪ ವಾಯ್ಸ್ ಚಾಟ್‌ನಲ್ಲಿ ಮೆಲೋಡಿಗಳನ್ನು ಪ್ಲೇ ಮಾಡಿ\n│ ❐ ಸುಂದರ ಚಿತ್ರಗಳನ್ನು ರಚಿಸಿ\n│ ⊹ ಅನೇಕ ಭಾಷೆಗಳಲ್ಲಿ ಟೆಕ್ಸ್ಟ್ ಅನುವಾದಿಸಿ\n│ ⚡ ಚಾಟ್‌ಗಳನ್ನು ನಿಯಂತ್ರಿಸಿ — ಮ್ಯೂಟ್ | ಬ್ಯಾನ್ | ಅನ್‌ಬ್ಯಾನ್ | ಕಿಕ್\n│ ✧ ವಿಶೇಷ ಸ್ವಾಗತ ಸಂದೇಶಗಳು\n│ ⋆ ಹೆಚ್ಚಿನ ಫೀಚರ್‌ಗಳು → ಕಮಾಂಡ್ಸ್ ಬಟನ್ ಕ್ಲಿಕ್ ಮಾಡಿ\n╰─━━━━━━━━━━⧫\n◈ ಎಲ್ಲಾ ಮಾಡ್ಯೂಲ್‌ಗಳು ಮತ್ತು ಕಮಾಂಡ್ಸ್ ಕಂಡುಹಿಡಿಯಲು ಹೆಲ್ಪ್ ಕ್ಲಿಕ್ ಮಾಡಿ ❥\n\n⌯ ಡೆವಲಪರ್ : [⎎ 𝙸𝚂𝚃𝙺𝙷𝙰𝚁 ⎎](https://t.me/IAMIstkhar)"
start_3: "⊹ ಹೇಯ್ {0},\nಇದು {1}\n\n❥ ನನ್ನನ್ನು {2} ನಲ್ಲಿ ಸೇರಿಸಿದ್ದಕ್ಕೆ ಧನ್ಯವಾದಗಳು, {3} ಈಗ ಈ ಚಾಟ್‌ನಲ್ಲಿ ಹಾಡುಗಳನ್ನು ಪ್ಲೇ ಮಾಡಬಹುದು."
start_4: "⊞ <b>ಸೂಪರ್‌ಗ್ರೂಪ್ ಅಗತ್ಯ</b> ⊞\n\n⟳ ದಯವಿಟ್ಟು ನಿಮ್ಮ ಗ್ರೂಪ್ ಅನ್ನು ಸೂಪರ್‌ಗ್ರೂಪ್ ಆಗಿ ಬದಲಾಯಿಸಿ ನನ್ನನ್ನು ಮತ್ತೆ ಸೇರಿಸಿ.\n\n◈ ಸೂಪರ್‌ಗ್ರೂಪ್ ಹೇಗೆ ಮಾಡುವುದು?\n- ನಿಮ್ಮ ಗ್ರೂಪ್ ಚಾಟ್ ಹಿಸ್ಟರಿಯನ್ನು ಒಮ್ಮೆ ಗೋಚರವಾಗುವಂತೆ ಮಾಡಿ."
start_5: "⊘ <b>↝ ಬ್ಲಾಕ್‌ಲಿಸ್ಟ್ ಮಾಡಲಾದ ಚಾಟ್ ↜</b>\n\n⊗ ಈ ಚಾಟ್ {0} ಡೇಟಾಬೇಸ್‌ನಲ್ಲಿ ಬ್ಲಾಕ್‌ಲಿಸ್ಟ್ ಮಾಡಲಾಗಿದೆ.\n↬ ದಯವಿಟ್ಟು ಸುಡೋ ಬಳಕೆದಾರರಿಂದ ನಿಮ್ಮ ಚಾಟ್ ಅನ್ನು ಅನ್‌ಬ್ಲಾಕ್‌ಲಿಸ್ಟ್ ಮಾಡಲು ವಿನಂತಿಸಿ ಅಥವಾ ಸಪೋರ್ಟ್ ಚಾಟ್‌ಗೆ ಹೋಗಿ."
start_6: "♪ <b>ಟ್ರ್ಯಾಕ್ ಮಾಹಿತಿ</b> ♪\n\n◈ ಶೀರ್ಷಿಕೆ : {0}\n\n⧗ ಅವಧಿ : {1} ನಿಮಿಷಗಳು\n❐ ವೀಕ್ಷಣೆಗಳು : <code>{2}</code>\n◈ ಪ್ರಕಟಿಸಲಾಗಿದೆ : {3}\n◈ ಚಾನೆಲ್ : <a href={4}>{5}</a>\n\n⊛ <u><b>ಸರ್ಚ್ ಪವರ್ಡ್ ಬೈ {6}</b></u>"


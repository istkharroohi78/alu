setting_1: "⌬ <u><b>{0} ಸೆಟ್ಟಿಂಗ್ಸ್ ಪ್ಯಾನೆಲ್</b></u>\n\n❐ ಚಾಟ್ ಐಡಿ : <code>{1}</code>\n❐ ಚಾಟ್ ಶೀರ್ಷಿಕೆ : {2}\n\n◈ ಸೆಟ್ಟಿಂಗ್ಸ್ ಬದಲಾಯಿಸಲು ಕೆಳಗಿನ ಬಟನ್‌ಗಳನ್ನು ಕ್ಲಿಕ್ ಮಾಡಿ."
setting_2: "⊛ ಡೈರೆಕ್ಟ್ : ಸರ್ಚ್ ಕ್ವೆರಿಯನ್ನು ನೇರವಾಗಿ ಪ್ಲೇ ಮಾಡುತ್ತದೆ.\n\n◈ ಇನ್‌ಲೈನ್ : ವೀಡಿಯೋ ಮತ್ತು ಆಡಿಯೋ ನಡುವೆ ಆಯ್ಕೆ ಮಾಡಲು ಇನ್‌ಲೈನ್ ಬಟನ್‌ಗಳನ್ನು ನೀಡುತ್ತದೆ."
setting_3: "⊹ ಎಲ್ಲರೂ : ಯಾರಾದರೂ ನಿರ್ವಾಹಕ ಕಮಾಂಡ್ಸ್ (ಸ್ಕಿಪ್, ವಿರಾಮ, ಪುನರಾರಂಭ ಮೊದಲಾದವು) ಬಳಸಬಹುದು.\n\n᚛ ನಿರ್ವಾಹಕ ಮಾತ್ರ : ನಿರ್ವಾಹಕರು ಮತ್ತು ಅಧಿಕೃತ ಬಳಕೆದಾರರು ಮಾತ್ರ ಕಮಾಂಡ್ಸ್ ಬಳಸಬಹುದು."
setting_4: "❍ ಅಧಿಕೃತ ಬಳಕೆದಾರರು ಕಂಡುಬಂದಿಲ್ಲ."
setting_5: "↬ ಗ್ರೂಪ್ : ಕಮಾಂಡ್ ನೀಡಿದ ಗ್ರೂಪ್‌ನಲ್ಲಿ ಮ್ಯೂಜಿಕ್ ಪ್ಲೇ ಮಾಡುತ್ತದೆ.\n\n◈ ಚಾನೆಲ್ : ನೀವು ಬಯಸುವ ಚಾನೆಲ್‌ನಲ್ಲಿ ಮ್ಯೂಜಿಕ್ ಪ್ಲೇ ಮಾಡುತ್ತದೆ. ಚಾನೆಲ್ ಐಡಿ ಹೊಂದಿಸಿ /channelplay"
setting_6: "⊹ ಎಲ್ಲರೂ : ಈ ಗ್ರೂಪ್‌ನಲ್ಲಿರುವ ಯಾರಾದರೂ ಮ್ಯೂಜಿಕ್ ಪ್ಲೇ ಮಾಡಬಹುದು.\n\n᚛ ನಿರ್ವಾಹಕ ಮಾತ್ರ: ನಿರ್ವಾಹಕರು ಮಾತ್ರ ಗ್ರೂಪ್‌ನಲ್ಲಿ ಮ್ಯೂಜಿಕ್ ಪ್ಲೇ ಮಾಡಬಹುದು."
setting_7: "◈ ದಯವಿಟ್ಟು /channelplay ಮೂಲಕ ಚಾನೆಲ್ ಐಡಿ ನಿರ್ಧರಿಸಿ"
setting_8: "⊞ ಈ ಮೋಡ್ ಪ್ರಾರಂಭಿಸಿದಾಗ, ನಿರ್ವಾಹಕ ಹಕ್ಕುಗಳಿಲ್ಲದ ವ್ಯಕ್ತಿಗಳು ನಿರ್ಧರಿತ ಸಂಖ್ಯೆಯ ಮತಗಳ ನಂತರ ನಿರ್ವಾಹಕ ಕಮಾಂಡ್ಸ್ ಬಳಸಬಹುದು."
